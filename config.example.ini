# Copy to mpdl.ini and adjust. mpdl.ini is git-ignored, so the token stays local.
# Every value here can also be supplied via a CLI flag or an environment variable.
# Resolution order per setting: CLI flag > environment variable > this file > default.

[moodle]
# Moodle base URL (no trailing slash).
base_url = https://moodle.example.edu

# Web service token. Storing it here is discouraged; the MOODLE_TOKEN environment
# variable or a token file (--token-file) keep it out of config files. If stored
# here, keep mpdl.ini private (it is git-ignored by default).
# token = 0123456789abcdef0123456789abcdef

[download]
# Browser to read Panopto login cookies from: safari | chrome | firefox | edge | brave ...
browser = safari

# Download directory.
out = downloads

# Number of courses scraped in parallel (used with --all-courses or multiple ids).
jobs = 4

# Optional: only needed if Panopto links appear as bare ids and host auto-detection
# fails. Normally the host is detected from the links themselves.
# panopto_host = institution.cloud.panopto.eu

# Optional: use an exported Netscape cookies.txt instead of reading a live browser.
# cookies_file = panopto_cookies.txt
